<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Shield shape -->
  <path d="M256 72 L400 136 L400 280 C400 368 336 432 256 456 C176 432 112 368 112 280 L112 136 Z" 
        fill="url(#shield)" opacity="0.9"/>
  
  <!-- Inner shield highlight -->
  <path d="M256 96 L380 152 L380 272 C380 348 324 404 256 428 C188 404 132 348 132 272 L132 152 Z" 
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Magnifying glass (patrol/search) -->
  <circle cx="232" cy="232" r="64" fill="none" stroke="white" stroke-width="20" opacity="0.95"/>
  <line x1="278" y1="278" x2="330" y2="330" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.95"/>
  
  <!-- Small sparkle dots -->
  <circle cx="168" cy="168" r="6" fill="#f97316" opacity="0.9"/>
  <circle cx="340" cy="180" r="4" fill="#f97316" opacity="0.7"/>
  <circle cx="180" cy="340" r="5" fill="#f97316" opacity="0.8"/>
  
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" fill="white" letter-spacing="4">PATROL</text>
</svg>
