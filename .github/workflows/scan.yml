name: Patrol Scanner

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Fetch keywords from product store
        id: keywords
        run: |
          RESPONSE=$(curl -sf "$APP_URL/api/products/keywords/scan" 2>/dev/null || echo '{}')
          KEYWORDS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); kws=d.get('keywords',[]); print(','.join(kws) if kws else '')" 2>/dev/null || echo "")
          if [ -z "$KEYWORDS" ]; then
            echo "⚠️ No keywords found in product store. Skipping scan."
            echo "keywords=" >> "$GITHUB_OUTPUT"
          else
            echo "keywords=$KEYWORDS" >> "$GITHUB_OUTPUT"
            echo "📋 Keywords: $KEYWORDS"
          fi
        env:
          APP_URL: https://coupang-patrol.vercel.app

      - name: Run Threads Scanner
        if: steps.keywords.outputs.keywords != ''
        env:
          APP_URL: https://coupang-patrol.vercel.app
          KEYWORDS: ${{ steps.keywords.outputs.keywords }}
        run: npx tsx scanner/search.ts --once

      - name: Run X (Twitter) Scanner
        if: steps.keywords.outputs.keywords != ''
        env:
          APP_URL: https://coupang-patrol.vercel.app
          KEYWORDS: ${{ steps.keywords.outputs.keywords }}
          X_AUTH_COOKIES: ${{ secrets.X_AUTH_COOKIES }}
        run: npx tsx scanner/x-search.ts --once

      - name: Scan Summary
        if: always()
        run: echo "✅ Scan completed at $(date)"
